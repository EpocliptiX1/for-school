<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Химическая игра - Синий раунд</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .board-container {
            max-width: 1100px;
            margin: 1rem auto;
            padding: 1rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        @media (min-width: 768px) {
            .board-container {
                margin: 2rem auto;
                padding: 2rem;
            }
        }
        
        /* Контейнер для адаптивной прокрутки таблицы */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 1rem;
            border-radius: 4px;
        }

        .game-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0.25rem;
            min-width: 700px; /* Гарантирует, что сетка не "схлопнется" на мобилках */
        }
        @media (min-width: 768px) {
            .game-table {
                border-spacing: 0.5rem;
            }
        }

        .category-name {
            background-color: #e5e7eb;
            padding: 0.75rem;
            text-align: left;
            font-weight: 600;
            border-radius: 4px;
            width: 30%;
            font-size: 0.85rem;
            line-height: 1.2;
        }
        @media (min-width: 768px) {
            .category-name {
                padding: 1rem;
                font-size: 0.95rem;
            }
        }

        .point-cell {
            color: white;
            text-align: center;
            padding: 0.75rem 0.5rem;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            user-select: none;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            min-width: 60px;
        }
        @media (min-width: 768px) {
            .point-cell {
                padding: 1rem;
                font-size: 1.25rem;
                min-width: 80px;
            }
        }

        .point-cell:hover {
            transform: scale(1.05);
            filter: brightness(90%);
        }
        .point-cell.visited {
            background-color: #94a3b8 !important;
            border-color: #64748b !important;
            cursor: default;
            transform: none;
            filter: none;
        }

        /* Цветовой градиент */
        .val-10 { background-color: #4ade80; border-bottom: 3px solid #16a34a; }
        .val-20 { background-color: #a3e635; border-bottom: 3px solid #65a30d; }
        .val-30 { background-color: #facc15; border-bottom: 3px solid #ca8a04; }
        .val-40 { background-color: #fb923c; border-bottom: 3px solid #ea580c; }
        .val-50 { background-color: #dc2626; border-bottom: 3px solid #991b1b; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 50;
            padding: 1rem;
        }
        
        .modal-content {
            max-height: 90vh;
            overflow-y: auto;
            width: 100%;
            max-width: 600px;
        }

        .answer-box {
            display: none;
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #f0fdf4;
            border-left: 4px solid #22c55e;
            border-radius: 4px;
        }
        .svoya-igra {
            background-color: #fef3c7;
            color: #92400e;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: bold;
            border: 1px solid #f59e0b;
            display: inline-block;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

<div class="board-container">
    <h1 class="text-xl md:text-2xl font-bold mb-4 md:mb-6 text-gray-800 text-center px-2">Интеллектуальная игра по химии: "Синий раунд"</h1>
    
    <div class="table-responsive">
        <table class="game-table">
            <tbody id="game-body">
                <!-- Генерируется через JS -->
            </tbody>
        </table>
    </div>

    <div class="mt-8 p-4 border-t border-gray-200">
        <h2 class="text-lg font-bold text-red-700 mb-2">Условие игры "Красный раунд"</h2>
        <p class="text-sm md:text-base text-gray-700 italic">
            Этот раунд проводится аналогично "синему", но изменяются области знаний и цена вопроса в соответствии с таблицей...
        </p>
    </div>
</div>

<!-- Модальное окно вопроса -->
<div id="q-modal" class="modal">
    <div class="bg-white p-6 md:p-8 rounded-lg shadow-xl modal-content">
        <div id="svoya-badge" class="svoya-igra hidden">★ СВОЯ ИГРА ★</div>
        <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-4 gap-2">
            <h3 id="modal-title" class="text-lg md:text-xl font-bold text-blue-700"></h3>
            <span id="modal-points" class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-bold text-sm w-fit"></span>
        </div>
        
        <div class="py-2">
            <p id="question-text" class="text-base md:text-lg text-gray-800 leading-relaxed font-medium whitespace-pre-line"></p>
        </div>

        <div id="answer-container" class="answer-box">
            <p class="text-xs font-bold text-green-700 mb-1">ОТВЕТ:</p>
            <p id="answer-text" class="text-gray-900 font-bold text-base md:text-lg"></p>
        </div>

        <div class="mt-6 md:mt-8 flex flex-col sm:flex-row gap-2">
            <button id="show-answer-btn" onclick="toggleAnswer()" class="order-1 sm:order-none flex-1 bg-green-600 text-white px-4 py-3 rounded hover:bg-green-700 transition font-bold">
                Показать ответ
            </button>
            <button id="keep-disabled-btn" onclick="closeAndKeepDisabled()" class="order-2 sm:order-none flex-1 bg-blue-600 text-white px-4 py-3 rounded hover:bg-blue-700 transition hidden font-bold">
                Завершить
            </button>
            <button onclick="closeModalAndReset()" class="order-3 sm:order-none flex-1 bg-gray-800 text-white px-4 py-3 rounded hover:bg-gray-900 transition font-bold">
                Отмена
            </button>
        </div>
    </div>
</div>

<script>
    let activeCellId = null;

    const questionBank = {
        "q-metals-10": { q: "Назовите металл, вызывающий \"лихорадку\"?", a: "Золото" },
        "q-metals-20": { q: "Какой неметалл придает твердость и белизну зубной эмали?", a: "Фтор" },
        "q-metals-30": { q: "Какой неметалл был назван \"элементом жизни и мысли\"?", a: "Фосфор" },
        "q-metals-40": { q: "Какой металл может болеть \"чумой\"?", a: "Олово" },
        "q-metals-50": { q: "Из какого чудодейственного металла была изготовлена офицерская посуда в армии Александра Македонского?", a: "Серебро" },

        "q-riddles-10": { q: "Гость из космоса пришел в воде приют себе нашел.", a: "Водород" },
        "q-riddles-20": { q: "Давно известна человеку.\nОна тягуча и красна.\nЗнакома в сплавах всем она.", a: "Медь" },
        "q-riddles-30": { q: "Меня в составе мрамора найди,\nЯ твердость придаю кости,\nВ составе извести еще меня найдешь.", a: "Кальций" },
        "q-riddles-40": { q: "Я крылатый элемент\nВ небеса лечу на керосине,\nПровожу тепло и ток,\nНахожусь в природе в глине.", a: "Алюминий" },
        "q-riddles-50": { q: "Он безжизненным зовется, но жизнь без него не создается.", a: "Азот", isSvoya: true },

        "q-phrase-10": { q: "21% по объему в воздухе занимает ...", a: "Кислород" },
        "q-phrase-20": { q: "Дождь - это ... явление", a: "Физическое" },
        "q-phrase-30": { q: "Алюминиевые и железные стружки можно разделить ...", a: "Магнитом" },
        "q-phrase-40": { q: "Формула угарного газа ...", a: "CO" },
        "q-phrase-50": { q: "Купоросное масло - это...", a: "Серная кислота" },

        "q-believe-10": { q: "Аргентина названа в честь серебра?", a: "Да" },
        "q-believe-20": { q: "Платину назвали \"гнилое золото\", \"лягушачье золото\", \"серебришко\"?", a: "Да" },
        "q-believe-30": { q: "Если слиток серебра рубили пополам, то получали гривенники?", a: "Нет, рубли" },
        "q-believe-40": { q: "Первый исторически известный паспорт был бронзовый?", a: "Да", isSvoya: true },
        "q-believe-50": { q: "Эйфелева башня летом на 15 см выше, чем зимой?", a: "Да" },

        "q-concepts-10": { q: "Как называется цифра перед формулой или знаком?", a: "Коэффициент" },
        "q-concepts-20": { q: "Единица измерения количества вещества.", a: "Моль" },
        "q-concepts-30": { q: "Явление превращения одних веществ в другие.", a: "Химическое" },
        "q-concepts-40": { q: "Мельчайшая частица вещества химически неделимая.", a: "Атом" },
        "q-concepts-50": { q: "Молярный объем любого газа при н. у. равен ...", a: "22,4 л/моль" },

        "q-trans-10": { q: "Какой химический элемент носит название соснового леса?", a: "Бор" },
        "q-trans-20": { q: "Замените первую букву в ЗОЛОТО и получите болотистую местность.", a: "Золото -> Болото" },
        "q-trans-30": { q: "Отрежьте 1/3 от СЕРЕБРО, чтобы получить кость.", a: "Серебро -> Ребро" },
        "q-trans-40": { q: "Название дерева внутри НИКЕЛЬ?", a: "Никель (Ель)" },
        "q-trans-50": { q: "Переставьте буквы в ФТОР и получите топливо.", a: "Фтор -> Торф" },

        "q-identify-10": { q: "СЛИКОДОР - без этого не проживете и 10 минут.", a: "Кислород" },
        "q-identify-20": { q: "ОРРЕБЕС - блестит, а не золото.", a: "Серебро" },
        "q-identify-30": { q: "УТЬРТ - единственный металл, жидкий при комнатной температуре.", a: "Ртуть" },
        "q-identify-40": { q: "ЗAАМЛ - самое твердое природное вещество.", a: "Алмаз" },
        "q-identify-50": { q: "ЛРОДУГЕ - основа всей органической химии.", a: "Углерод" }
    };

    const categories = [
        { id: "metals", name: "Металлы и неметаллы" },
        { id: "riddles", name: "Химические загадки" },
        { id: "phrase", name: "Закончите фразу" },
        { id: "believe", name: "Верите ли вы, что..." },
        { id: "concepts", name: "Химические понятия" },
        { id: "trans", name: "Превращения" },
        { id: "identify", name: "Узнай вещество" }
    ];

    const values = [10, 20, 30, 40, 50];

    function initBoard() {
        const tbody = document.getElementById('game-body');
        categories.forEach((cat) => {
            const tr = document.createElement('tr');
            const catCell = document.createElement('td');
            catCell.className = 'category-name';
            catCell.textContent = cat.name;
            tr.appendChild(catCell);
            
            values.forEach((val) => {
                const td = document.createElement('td');
                const uniqueId = `q-${cat.id}-${val}`;
                td.id = uniqueId;
                td.className = `point-cell val-${val}`;
                td.textContent = val;
                td.onclick = () => openQuestion(uniqueId, cat.name, val);
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
    }

    function openQuestion(id, category, value) {
        const cell = document.getElementById(id);
        if (cell.classList.contains('visited')) return;

        activeCellId = id;
        const data = questionBank[id] || { q: "Вопрос не найден.", a: "Ответ не найден." };

        const badge = document.getElementById('svoya-badge');
        data.isSvoya ? badge.classList.remove('hidden') : badge.classList.add('hidden');

        document.getElementById('modal-title').textContent = category;
        document.getElementById('modal-points').textContent = `${value} баллов`;
        document.getElementById('question-text').textContent = data.q;
        document.getElementById('answer-text').textContent = data.a;
        
        document.getElementById('answer-container').style.display = 'none';
        document.getElementById('show-answer-btn').style.display = 'block';
        document.getElementById('keep-disabled-btn').classList.add('hidden');
        document.getElementById('q-modal').style.display = 'flex';
        
        cell.classList.add('visited');
    }

    function toggleAnswer() {
        document.getElementById('answer-container').style.display = 'block';
        document.getElementById('show-answer-btn').style.display = 'none';
        document.getElementById('keep-disabled-btn').classList.remove('hidden');
    }

    function closeModalAndReset() {
        if (activeCellId) document.getElementById(activeCellId).classList.remove('visited');
        document.getElementById('q-modal').style.display = 'none';
        activeCellId = null;
    }

    function closeAndKeepDisabled() {
        document.getElementById('q-modal').style.display = 'none';
        activeCellId = null;
    }

    window.onload = initBoard;
</script>

</body>
</html>
