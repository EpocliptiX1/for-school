<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Химическая игра - Синий раунд</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .board-container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 1rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .game-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0.5rem;
        }
        .category-name {
            background-color: #e5e7eb;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            border-radius: 4px;
            width: 35%;
            font-size: 0.95rem;
        }
        .point-cell {
            color: white;
            text-align: center;
            padding: 1rem;
            font-weight: bold;
            font-size: 1.25rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            user-select: none;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            min-width: 80px;
        }
        .point-cell:hover {
            transform: scale(1.05);
            filter: brightness(90%);
        }
        .point-cell.visited {
            background-color: #94a3b8 !important;
            border-color: #64748b !important;
            cursor: default;
            transform: none;
            filter: none;
        }

        /* Color gradient classes */
        .val-10 { background-color: #4ade80; border-bottom: 3px solid #16a34a; }
        .val-20 { background-color: #a3e635; border-bottom: 3px solid #65a30d; }
        .val-30 { background-color: #facc15; border-bottom: 3px solid #ca8a04; }
        .val-40 { background-color: #fb923c; border-bottom: 3px solid #ea580c; }
        .val-50 { background-color: #dc2626; border-bottom: 3px solid #991b1b; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 50;
            padding: 1rem;
        }
        .answer-box {
            display: none;
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #f0fdf4;
            border-left: 4px solid #22c55e;
            border-radius: 4px;
        }
        .svoya-igra {
            background-color: #fef3c7;
            color: #92400e;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: bold;
            border: 1px solid #f59e0b;
            display: inline-block;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

<div class="board-container">
    <h1 class="text-2xl font-bold mb-6 text-gray-800 text-center">Интеллектуальная игра по химии: "Синий раунд"</h1>
    
    <table class="game-table">
        <tbody id="game-body">
            <!-- Generated by JS -->
        </tbody>
    </table>

    <div class="mt-12 p-4 border-t border-gray-200">
        <h2 class="text-xl font-bold text-red-700 mb-2">Условие игры "Красный раунд"</h2>
        <p class="text-gray-700 italic">
            Этот раунд проводится аналогично "синему", но изменяются области знаний и цена вопроса в соответствии с таблицей, а также предусмотрены два вопроса "Своя игра", обозначенные в перечне.
        </p>
    </div>
</div>

<!-- Question Modal -->
<div id="q-modal" class="modal">
    <div class="bg-white p-8 rounded-lg shadow-xl max-w-2xl w-full">
        <div id="svoya-badge" class="svoya-igra hidden">★ СВОЯ ИГРА ★</div>
        <div class="flex justify-between items-center mb-4">
            <h3 id="modal-title" class="text-xl font-bold text-blue-700"></h3>
            <span id="modal-points" class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-bold"></span>
        </div>
        
        <div class="py-4">
            <p id="question-text" class="text-lg text-gray-800 leading-relaxed font-medium whitespace-pre-line"></p>
        </div>

        <div id="answer-container" class="answer-box">
            <p class="text-sm font-bold text-green-700 mb-1">ОТВЕТ:</p>
            <p id="answer-text" class="text-gray-900 font-bold text-lg"></p>
        </div>

        <div class="mt-8 flex gap-3">
            <button id="show-answer-btn" onclick="toggleAnswer()" class="flex-1 bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 transition">
                Показать ответ
            </button>
            <button id="keep-disabled-btn" onclick="closeAndKeepDisabled()" class="flex-1 bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition hidden">
                Завершить
            </button>
            <button onclick="closeModalAndReset()" class="flex-1 bg-gray-800 text-white px-6 py-2 rounded hover:bg-gray-900 transition">
                Закрыть (Отмена)
            </button>
        </div>
    </div>
</div>

<script>
    let activeCellId = null;

    const questionBank = {
        // Металлы и неметаллы
        "q-metals-10": { q: "Назовите металл, вызывающий \"лихорадку\"?", a: "Золото" },
        "q-metals-20": { q: "Какой неметалл придает твердость и белизну зубной эмали?", a: "Фтор" },
        "q-metals-30": { q: "Какой неметалл был назван \"элементом жизни и мысли\"?", a: "Фосфор" },
        "q-metals-40": { q: "Какой металл может болеть \"чумой\"?", a: "Олово" },
        "q-metals-50": { q: "Если верить древнему историку, то во времена похода Александра Македонского в Индию офицеры его армии страдали желудочно-кишечными заболеваниями гораздо реже, чем солдаты, еда и питье были у них одинаковые, а вот металлическая посуда разная. Из какого чудодейственного металла была изготовлена офицерская посуда?", a: "Серебро" },

        // Химические загадки
        "q-riddles-10": { q: "Гость из космоса пришел в воде приют себе нашел.", a: "Водород" },
        "q-riddles-20": { q: "Давно известна человеку.\nОна тягуча и красна.\nЕще по бронзовому веку\nЗнакома в сплавах всем она.", a: "Медь" },
        "q-riddles-30": { q: "Меня в составе мрамора найди,\nЯ твердость придаю кости,\nВ составе извести еще меня найдешь\nТеперь меня ты, верно, назовешь.", a: "Кальций" },
        "q-riddles-40": { q: "Я крылатый элемент\nВ небеса лечу на керосине,\nПровожу тепло и ток,\nНахожусь в природе в глине.", a: "Алюминий" },
        "q-riddles-50": { q: "Он безжизненным зовется, но жизнь без него не создается.", a: "Азот", isSvoya: true },

        // Закончите фразу
        "q-phrase-10": { q: "21% по объему в воздухе занимает ...", a: "Кислород" },
        "q-phrase-20": { q: "Дождь - это ... явление", a: "Физическое" },
        "q-phrase-30": { q: "Алюминиевые и железные стружки можно разделить ...", a: "Магнитом" },
        "q-phrase-40": { q: "Формула угарного газа ...", a: "CO" },
        "q-phrase-50": { q: "Купоросное масло - это...", a: "Серная кислота" },

        // Верите ли вы, что...
        "q-believe-10": { q: "Аргентина названа в честь серебра?", a: "Да" },
        "q-believe-20": { q: "Платину назвали \"гнилое золото\", \"лягушачье золото\", \"серебришко\"?", a: "Да" },
        "q-believe-30": { q: "Гривна - это слиток серебра массой 200 г. Если этот слиток рубили пополам, то получали гривенники?", a: "Нет, рубли" },
        "q-believe-40": { q: "Первый исторически известный паспорт был бронзовый?", a: "Да", isSvoya: true },
        "q-believe-50": { q: "Эйфелева башня \"железная мадам\", так ее часто называют в Париже, летом на 15 см выше, чем зимой?", a: "Да" },

        // Первоначальные химические понятия
        "q-concepts-10": { q: "Как называется цифра перед формулой или знаком?", a: "Коэффициент" },
        "q-concepts-20": { q: "Единица измерения количества вещества.", a: "Моль" },
        "q-concepts-30": { q: "Явление, при котором происходит превращение одних веществ в другие называется ...", a: "Химическое" },
        "q-concepts-40": { q: "Мельчайшая частица вещества химически неделимая.", a: "Атом" },
        "q-concepts-50": { q: "Молярный объем любого газа при н. у. равен ...", a: "22,4 л/моль" },

        // Превращение без превращений
        "q-trans-10": { q: "Какой химический элемент носит название соснового леса?", a: "Бор" },
        "q-trans-20": { q: "В названии благородного металла замените первую букву и получите название избыточно увлажненного участка земли, заросшего растениями.", a: "Золото -> Болото" },
        "q-trans-30": { q: "От какого металла нужно отрезать 1/3, чтобы получилось известная кость?", a: "Серебро -> Ребро" },
        "q-trans-40": { q: "В название какого химического элемента входит название дерева?", a: "Никель (Ель)" },
        "q-trans-50": { q: "В названии галогена измените порядок букв и получите название твердого топлива, которое часто используется как органическое удобрение.", a: "Фтор -> Торф" },

        // Узнай вещество или элемент
        "q-identify-10": { q: "СЛИКОДОР - без этого вещества не проживете и десяти минут.", a: "Кислород" },
        "q-identify-20": { q: "ОРРЕБЕС - блестит, а не золото.", a: "Серебро" },
        "q-identify-30": { q: "УТЬРТ - единственный металл, который 'плачет' (остается жидким) при комнатной температуре.", a: "Ртуть" },
        "q-identify-40": { q: "ЗAАМЛ - самое твердое природное вещество, состоящее исключительно из атомов углерода.", a: "Алмаз" },
        "q-identify-50": { q: "ЛРОДУГЕ - основа всей органической химии, элемент, способный образовывать миллионы соединений.", a: "Углерод" }
    };

    const categories = [
        { id: "metals", name: "Металлы и неметаллы" },
        { id: "riddles", name: "Химические загадки" },
        { id: "phrase", name: "Закончите фразу" },
        { id: "believe", name: "Верите ли вы, что..." },
        { id: "concepts", name: "Первоначальные химические понятия" },
        { id: "trans", name: "Превращение без превращений" },
        { id: "identify", name: "Узнай вещество или элемент" }
    ];

    const values = [10, 20, 30, 40, 50];

    function initBoard() {
        const tbody = document.getElementById('game-body');
        categories.forEach((cat) => {
            const tr = document.createElement('tr');
            const catCell = document.createElement('td');
            catCell.className = 'category-name';
            catCell.textContent = cat.name;
            tr.appendChild(catCell);
            
            values.forEach((val) => {
                const td = document.createElement('td');
                const uniqueId = `q-${cat.id}-${val}`;
                td.id = uniqueId;
                td.className = `point-cell val-${val}`;
                td.textContent = val;
                td.onclick = () => openQuestion(uniqueId, cat.name, val);
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
    }

    function openQuestion(id, category, value) {
        const cell = document.getElementById(id);
        if (cell.classList.contains('visited')) return;

        activeCellId = id;
        const data = questionBank[id] || { 
            q: "Вопрос пока не добавлен в базу.", 
            a: "Ответ отсутствует." 
        };

        const badge = document.getElementById('svoya-badge');
        if (data.isSvoya) badge.classList.remove('hidden');
        else badge.classList.add('hidden');

        document.getElementById('modal-title').textContent = category;
        document.getElementById('modal-points').textContent = `${value} баллов`;
        document.getElementById('question-text').textContent = data.q;
        document.getElementById('answer-text').textContent = data.a;
        
        document.getElementById('answer-container').style.display = 'none';
        document.getElementById('show-answer-btn').style.display = 'block';
        document.getElementById('keep-disabled-btn').classList.add('hidden');
        document.getElementById('q-modal').style.display = 'flex';
        
        // Temporarily mark as visited
        cell.classList.add('visited');
    }

    function toggleAnswer() {
        document.getElementById('answer-container').style.display = 'block';
        document.getElementById('show-answer-btn').style.display = 'none';
        // Once answer is shown, give option to just close (staying disabled)
        document.getElementById('keep-disabled-btn').classList.remove('hidden');
    }

    function closeModalAndReset() {
        // Remove the visited class if we just want to "undo" the click
        if (activeCellId) {
            document.getElementById(activeCellId).classList.remove('visited');
        }
        document.getElementById('q-modal').style.display = 'none';
        activeCellId = null;
    }

    function closeAndKeepDisabled() {
        // Just close, leaving the cell in its current 'visited' state
        document.getElementById('q-modal').style.display = 'none';
        activeCellId = null;
    }

    window.onload = initBoard;
</script>

</body>
</html>
